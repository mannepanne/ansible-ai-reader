# Cloudflare Workers configuration for Ansible AI Reader
name = "ansible-ai-reader"
main = ".open-next/worker.js"
compatibility_date = "2026-03-06"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

# Cloudflare Queues Configuration
# SETUP: Create queue with: npx wrangler queues create ansible-processing-queue
# VERIFY: Check queue exists with: npx wrangler queues list

[[queues.producers]]
queue = "ansible-processing-queue"
binding = "PROCESSING_QUEUE"

# Consumer configuration in separate worker (wrangler-consumer.toml)
# This keeps the Next.js worker and queue consumer independent

# Cron Triggers - Automated Scheduled Syncing
# Handled by separate worker (wrangler-cron.toml)
# OpenNext workers don't support scheduled() function, so cron must be external

# Environment Variables
# All environment variables are set as secrets via wrangler CLI to avoid committing values to git.
# Required secrets (set via: wrangler secret put <KEY_NAME>):
#   - NEXT_PUBLIC_SUPABASE_URL
#   - NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY
#   - SUPABASE_SECRET_KEY
#   - RESEND_API_KEY
#   - CRON_SECRET (for /api/cron/auto-sync endpoint authentication)
#   - NEXT_PUBLIC_CLOUDFLARE_TURNSTILE_SITE_KEY (contact form CAPTCHA — also required at build time in CI)
#   - CLOUDFLARE_TURNSTILE_SECRET_KEY (contact form CAPTCHA server-side verification)
#   - RESEND_FROM_EMAIL (contact form sender address — verified Resend domain)
#   - CONTACT_EMAIL (contact form recipient — never exposed to client)
#   - NEXT_PUBLIC_CF_ANALYTICS_TOKEN (Cloudflare Web Analytics public site token — also required at build time in CI)
#
# Note: CRON_SECRET is also required in the cron worker (wrangler-cron.toml)
# Note: NEXT_PUBLIC_CLOUDFLARE_TURNSTILE_SITE_KEY must also be in the CI build step env (baked at build time)
# Note: NEXT_PUBLIC_CF_ANALYTICS_TOKEN must also be in the CI build step env (baked at build time)
# See REFERENCE/operations/environment-setup.md for values and configuration details.
